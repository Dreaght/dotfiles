general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.95
    brightness = 0.8
    vibrancy = 0.2
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 92
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT[us,ru]
    color = rgba(200, 200, 200, 1.0)
    font_size = 18
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(33, 204, 255, 0.95)
    inner_color = rgba(20, 20, 20, 0.65)
    font_color = rgba(235, 235, 235, 1.0)
    check_color = rgba(0, 255, 153, 0.95)
    fail_color = rgba(255, 102, 102, 0.95)
    placeholder_text = <i>Password...</i>
    fail_text = <i>$FAIL</i>
    hide_input = false
    rounding = 14
    position = 0, -30
    halign = center
    valign = center
}

label {
    monitor =
    text = <span size="larger">$USER</span>
    color = rgba(220, 220, 220, 1.0)
    font_size = 20
    position = 0, -100
    halign = center
    valign = center
}
